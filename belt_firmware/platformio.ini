; PlatformIO configuration for 360 Haptic Belt firmware
; Directional vibration peripheral

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -Wall
    -Wextra

; Native test environment
[env:native]
platform = native
build_flags =
    -std=c++17
    -Wall
    -Wextra
    -DUNIT_TEST
test_build_src = yes
lib_compat_mode = off
