; PlatformIO configuration for Magic Cane firmware
; Primary safety computer – ESP32-S3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Wall
    -Wextra
lib_deps =
    adafruit/Adafruit BNO08x@^1.2.5
    pololu/VL53L1X@^1.3.1

; Native test environment – runs hazard-detection unit tests on the host
[env:native]
platform = native
build_flags =
    -std=c++17
    -Wall
    -Wextra
    -DUNIT_TEST
test_build_src = yes
lib_compat_mode = off
